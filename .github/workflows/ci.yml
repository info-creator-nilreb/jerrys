name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      AUTH_SECRET: ci-lighthouse-secret-minimum-32-characters-long
      AUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      PORT: "3000"
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # NODE_ENV=production würde sonst devDependencies auslassen; Next-Build braucht u. a. @types/* und TypeScript.
      - name: Install dependencies
        run: npm ci --include=dev

      - name: Wait for Postgres
        run: npx --yes wait-on@8.0.1 tcp:127.0.0.1:5432 -t 120000

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Production build
        run: npm run build

      # continue-on-error: Lighthouse auf GitHub-Runnern schwankt stark; Job bleibt grün, Schritt ggf. mit Warnung.
      - name: Start server & run Lighthouse
        continue-on-error: true
        run: |
          npm run start &
          npx --yes wait-on@8.0.1 http://127.0.0.1:3000 -t 120000
          npx --yes @lhci/cli@0.14.0 autorun
