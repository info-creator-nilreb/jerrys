name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  security:
    name: Security (SAST + secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Semgrep (TypeScript/JavaScript + Security-Audit)
        run: |
          python3 -m pip install --user semgrep
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          semgrep scan \
            --config=p/typescript \
            --config=p/javascript \
            --config=p/security-audit \
            --error \
            .

      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: npm audit (high+)
        run: npm audit --audit-level=high

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test:unit

      - name: Integration tests
        run: npm run test:integration

  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [security, check]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      CI: "true"
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      AUTH_SECRET: ci-e2e-secret-minimum-32-characters-long-xx
      AUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SUPABASE_URL: https://ci-placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ci-placeholder-anon-key
      PORT: "3000"
      NODE_ENV: production
      PLAYWRIGHT_WEB_SERVER: none
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --include=dev

      - name: Wait for Postgres
        run: npx --yes wait-on@8.0.1 tcp:127.0.0.1:5432 -t 120000

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Seed database
        run: npx prisma db seed

      - name: Production build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Start server & run E2E
        run: |
          npm run start &
          npx --yes wait-on@8.0.1 http://127.0.0.1:3000 -t 120000
          npm run test:e2e

  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      DIRECT_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/postgres
      AUTH_SECRET: ci-lighthouse-secret-minimum-32-characters-long
      AUTH_URL: http://127.0.0.1:3000
      NEXT_PUBLIC_SITE_URL: http://127.0.0.1:3000
      PORT: "3000"
      NODE_ENV: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      # NODE_ENV=production würde sonst devDependencies auslassen; Next-Build braucht u. a. @types/* und TypeScript.
      - name: Install dependencies
        run: npm ci --include=dev

      - name: Wait for Postgres
        run: npx --yes wait-on@8.0.1 tcp:127.0.0.1:5432 -t 120000

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Production build
        run: npm run build

      # continue-on-error: Lighthouse auf GitHub-Runnern schwankt stark; Job bleibt grün, Schritt ggf. mit Warnung.
      - name: Start server & run Lighthouse
        continue-on-error: true
        run: |
          npm run start &
          npx --yes wait-on@8.0.1 http://127.0.0.1:3000 -t 120000
          npx --yes @lhci/cli@0.14.0 autorun
